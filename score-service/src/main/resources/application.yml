server:
  port: 8083

spring:
  application:
    name: score-service
  datasource:
    url: jdbc:postgresql://localhost:5434/scribble
    username: admin_user
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate        # validate — not update, because Flyway owns the schema
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    mongodb:
      uri: mongodb://localhost:27017/scribble   # ← localhost for IntelliJ
  kafka:
    bootstrap-servers: localhost:9092             # ← localhost for IntelliJ
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: score-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.pm.*"


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/


management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always   # shows DB, Redis, Kafka status in /health
  health:
    circuitbreakers:
      enabled: true           # shows Resilience4j state in /health
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  tracing:
    sampling:
      probability: 1.0
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      minimum-expected-value:
        http.server.requests: 10ms
      maximum-expected-value:
        http.server.requests: 10s

resilience4j:
  retry:
    instances:
      kafka-consumer:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - org.springframework.dao.TransientDataAccessException
          - org.springframework.data.redis.RedisConnectionFailureException
          - java.io.IOException


#  Add @Retry to Kafka consumer methods in score-service and chat-service. These are the two services where a failed consume — due to a transient Redis write error or DB hiccup — would silently drop a score or a guess. Retry catches that.