server:
  port: 8083

spring:
  application:
    name: score-service
  datasource:
    url: jdbc:postgresql://localhost:5432/scribble
    username: admin_user
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate        # validate — not update, because Flyway owns the schema
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    mongodb:
      uri: mongodb://localhost:27017/scribble   # ← localhost for IntelliJ
  kafka:
    bootstrap-servers: localhost:9092             # ← localhost for IntelliJ
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: score-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.pm.*"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/