services:

  postgres:
    image: postgres:16-alpine
    container_name: scribble-postgres
    environment:
      POSTGRES_PASSWORD: rootpassword
#      POSTGRES_DB: scribble
#      POSTGRES_USER: admin_user
#      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_user -d scribble"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: scribble-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: scribble-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  kafka:
    image: apache/kafka:latest
    container_name: scribble-kafka
    ports:
      - "9092:9092"
    environment:
      # --- KRaft Configuration ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      CLUSTER_ID: 'scribble-cluster-12345' # Required by Apache to format storage

      # --- Network & Listeners ---
      KAFKA_LISTENERS: INTERNAL://:29092,CONTROLLER://:9093,EXTERNAL://:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # --- Development Settings ---
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  discovery-server:
    build: ./discovery-server
    ports: ["8761:8761"]
    environment:
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      retries: 5

  api-gateway:
    build: ./api-gateway
    container_name: scribble-gateway
    ports: ["8765:8765"]
    environment:
      SPRING_PROFILES_ACTIVE: docker
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production-256bit}
    depends_on:
      discovery-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD","curl","-f","http://localhost:8765/actuator/health" ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

  game-service:
    build: ./game-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      discovery-server:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD","curl","-f","http://localhost:8082/actuator/health" ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s

  user-service:
    build: ./user-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_PASSWORD: ${DB_PASSWORD:-rootpassword}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production-256bit}
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD","curl","-f","http://localhost:8084/actuator/health" ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s
  drawing-service:
    build: ./drawing-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      discovery-server:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  chat-service:
    build: ./chat-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      discovery-server:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: [ "CMD","curl","-f","http://localhost:8080/actuator/health" ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s

  word-service:
    build: ./word-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: [ "CMD","curl","-f","http://localhost:8085/actuator/health" ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s

  score-service:
    build: ./score-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      discovery-server:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: [ "CMD","curl","-f","http://localhost:8083/actuator/health" ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s


volumes:
  postgres_data:
  mongo_data:
  redis_data:
  kafka_data:


#start_period: 30s on Spring services tells Docker not to count failed healthchecks during the JVM startup window. Spring Boot takes 15–25s to fully start inside a container. Without start_period, the healthcheck fires during startup, fails, retries exhaust, and Docker marks the container as unhealthy before it ever had a chance.
#The startup order is enforced by depends_on: condition: service_healthy chains — not by restart policies. Docker Compose will not start api-gateway until discovery-server is healthy. It will not start any service until both discovery-server AND its required infra are healthy.