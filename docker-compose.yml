services:

  postgres:
    image: postgres:16-alpine
    container_name: scribble-postgres
    environment:
      POSTGRES_PASSWORD: rootpassword
#      POSTGRES_DB: scribble
#      POSTGRES_USER: admin_user
#      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin_user -d scribble"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: scribble-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: scribble-redis
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  kafka:
    image: apache/kafka:latest
    container_name: scribble-kafka
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    healthcheck:
      # Use a standard topic list command to verify the broker is alive and answering
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      # --- KRaft Configuration ---
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # FIX 1: Point to the container name, not localhost
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@scribble-kafka:9093
      # FIX 2: Must be a valid 22-character Base64 UUID
      CLUSTER_ID: '4L6g3nShT-eMCtK--X86sw'

      # --- Network & Listeners ---
      # FIX 3: Bind explicitly to 0.0.0.0 to avoid IPv6 mapping issues in Docker
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://scribble-kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      # --- Development Settings ---
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  discovery-server:
    build: ./discovery-server
    ports: ["8761:8761"]
    environment:
      SPRING_PROFILES_ACTIVE: docker
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      retries: 5

  api-gateway:
    build: ./api-gateway
    container_name: scribble-gateway
    ports: ["8765:8765"]
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATA_REDIS_HOST: scribble-redis
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production-256bit}
    depends_on:
      discovery-server:
        condition: service_healthy
      zipkin:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD","curl","-f","http://localhost:8765/actuator/health" ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

  game-service:
    build: ./game-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATA_REDIS_HOST: scribble-redis
      SPRING_KAFKA_BOOTSTRAP_SERVERS: scribble-kafka:29092
    depends_on:
      discovery-server:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      zipkin:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD","curl","-f","http://localhost:8082/actuator/health" ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s

  user-service:
    build: ./user-service
    ports: ["8084:8084"]
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_PASSWORD: ${DB_PASSWORD:-rootpassword}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production-256bit}
      SPRING_DATA_REDIS_HOST: scribble-redis
    depends_on:
      discovery-server:
        condition: service_healthy
      zipkin:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD","curl","-f","http://localhost:8084/actuator/health" ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s
  drawing-service:
    build: ./drawing-service
    ports: ["8081:8081"]
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_KAFKA_BOOTSTRAP_SERVERS: scribble-kafka:29092
      SPRING_DATA_REDIS_HOST: scribble-redis
    depends_on:
      discovery-server:
        condition: service_healthy
      zipkin:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  chat-service:
    build: ./chat-service
    ports: ["8080:8080"]
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_KAFKA_BOOTSTRAP_SERVERS: scribble-kafka:29092
      SPRING_DATA_REDIS_HOST: scribble-redis
    depends_on:
      discovery-server:
        condition: service_healthy
      zipkin:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: [ "CMD","curl","-f","http://localhost:8080/actuator/health" ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s

  word-service:
    build: ./word-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_KAFKA_BOOTSTRAP_SERVERS: scribble-kafka:29092
    depends_on:
      discovery-server:
        condition: service_healthy
      zipkin:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: [ "CMD","curl","-f","http://localhost:8085/actuator/health" ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s

  score-service:
    build: ./score-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_KAFKA_BOOTSTRAP_SERVERS: scribble-kafka:29092
      SPRING_DATA_REDIS_HOST: scribble-redis
    depends_on:
      discovery-server:
        condition: service_healthy
      zipkin:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: [ "CMD","curl","-f","http://localhost:8083/actuator/health" ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: scribble-zipkin
    ports: [ "9411:9411" ]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9411/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
  prometheus:
    image: prom/prometheus:latest
    container_name: scribble-prometheus
    ports: [ "9090:9090" ]
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    depends_on:
      - game-service
      - drawing-service
      - chat-service
      - score-service
      - word-service
      - user-service
    healthcheck:
      test: [ "CMD","wget","-q","--spider",
              "http://localhost:9090/-/healthy" ]
      interval: 15s
      retries: 3
  grafana:
    image: grafana/grafana:latest
    container_name: scribble-grafana
    ports: [ "3001:3000" ]
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: scribble
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  kafka_data:
  grafana_data:

#start_period: 30s on Spring services tells Docker not to count failed healthchecks during the JVM startup window. Spring Boot takes 15–25s to fully start inside a container. Without start_period, the healthcheck fires during startup, fails, retries exhaust, and Docker marks the container as unhealthy before it ever had a chance.
#The startup order is enforced by depends_on: condition: service_healthy chains — not by restart policies. Docker Compose will not start api-gateway until discovery-server is healthy. It will not start any service until both discovery-server AND its required infra are healthy.