server:
  port: 8085

spring:
  application:
    name: word-service
  datasource:
    url: jdbc:postgresql://localhost:5434/scribble_words
    username: admin_user
    password: password
    driver-class-name: org.postgresql.Driver

    jpa:
      hibernate:
        ddl-auto: validate        # validate — not update, because Flyway owns the schema
      show-sql: false
      properties:
        hibernate:
          dialect: org.hibernate.dialect.PostgreSQLDialect

    flyway:
      default-schema: word_schema
      create-schemas: true
      enabled: true
      locations: classpath:db/migration
      clean-disabled: false
      clean-on-validation-error: true
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: word-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.pm.*"

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/


management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always   # shows DB, Redis, Kafka status in /health
  health:
    circuitbreakers:
      enabled: true           # shows Resilience4j state in /health